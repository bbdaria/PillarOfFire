<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עמוד האש · Pillar of Fire</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=15" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="flame">🔥</span>
      <div>
        <h1>Pillar Of Fire</h1>
        <p class="tagline" id="tagline">מרחב עבודה אישי למוקדנית · איחוד שיחות חכם</p>
      </div>
      <!-- Role switcher: right next to the icon -->
      <nav class="role-switch" id="role-switch" aria-label="בחירת תפקיד">
        <button class="role-btn" data-role="moked">מוקדנית</button>
        <button class="role-btn" data-role="meshager">משגר</button>
        <button class="role-btn" data-role="hamal">מצודה</button>
      </nav>
    </div>

    <div class="controls">
      <button id="btn-theme" class="ghost subtle" title="מצב בהיר / כהה" aria-label="החלפת מצב תצוגה">🌙</button>
      <button id="btn-calendar" class="ghost subtle" title="אירועים מוכרים"><svg class="icn" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg> אירועים מוכרים</button>
      <button id="btn-upload" class="primary moked-only">⬆ העלאת הקלטות</button>
      <input id="file-input" type="file" accept="audio/*" multiple hidden />
      <button id="btn-reset" class="ghost subtle">איפוס</button>
    </div>
  </header>

  <main class="views">
    <!-- ===== מוקדנית: personal call-taking workspace (the original view) ===== -->
    <section class="view workspace" id="view-moked">
      <section class="pane incidents-pane">
        <div class="pane-head">
          <h2>האירועים שלי <span class="count" id="incidents-count">0</span></h2>
          <span class="pane-hint">לחצי על כרטיס לפתיחת פרטים</span>
        </div>
        <div id="incidents" class="incident-grid"></div>
      </section>

      <aside class="pane map-pane">
        <div id="map" class="map"></div>
        <div class="legend">
          <div class="legend-row">
            <span class="legend-title">חומרה</span>
            <div class="sev-spectrum">
              <span class="sev-end">נמוכה</span>
              <i class="sev-grad"></i>
              <span class="sev-end">קריטית</span>
            </div>
          </div>
          <div class="legend-row">
            <span class="legend-title">גודל</span>
            <span class="legend-item"><i class="sw ring sm"></i><i class="sw ring lg"></i>מספר שיחות מאוחדות</span>
          </div>
          <div class="legend-row">
            <span class="legend-title">ידוע</span>
            <span class="legend-item"><i class="sw ke-sw"></i>אירוע ידוע המתקיים היום</span>
          </div>
        </div>
      </aside>
    </section>

    <!-- ===== משגר: list + map side by side ===== -->
    <section class="view meshager-view" id="view-meshager" hidden>
      <div class="meshager-layout">
        <div class="meshager-list-pane">
          <div class="pane-head">
            <h2>אירועים שהועברו אליי <span class="count" id="meshager-count">0</span></h2>
            <span class="pane-hint">בחר אירוע כדי לשלוח כוחות ולנהל טיפול</span>
          </div>
          <div id="meshager-queue" class="meshager-list"></div>
        </div>
        <aside class="meshager-map-pane">
          <div id="meshager-map" class="map"></div>
        </aside>
      </div>
    </section>

    <!-- ===== מצודה: table-first operational overview ===== -->
    <section class="view hamal-view" id="view-hamal" hidden>
      <div class="hamal-main">
        <div class="hamal-topstrip">
          <div id="hamal-tiles" class="tiles strip"></div>
          <div class="panel sev-panel"><h3>לפי חומרה</h3><div id="chart-sev" class="barchart"></div></div>
        </div>
        <div class="ops-bar">
          <div class="filters" id="hamal-filters">
            <button class="filter-btn active" data-filter="all">הכל</button>
            <button class="filter-btn" data-filter="open">פתוחים</button>
            <button class="filter-btn" data-filter="resolved">טופלו</button>
            <button class="filter-btn" data-filter="critical">קריטיים</button>
          </div>
          <select id="hamal-sev-filter" class="hamal-filter-select" aria-label="סינון לפי חומרה">
            <option value="">כל רמות חומרה</option>
            <option value="low">נמוכה</option>
            <option value="medium">בינונית</option>
            <option value="high">גבוהה</option>
            <option value="critical">קריטית</option>
          </select>
          <span class="pane-hint" id="hamal-table-count"></span>
        </div>
        <div id="hamal-table" class="table-wrap"></div>
      </div>
      <aside class="hamal-side">
        <div class="panel map-panel"><h3>מפה</h3><div id="hamal-map" class="map"></div></div>
      </aside>
    </section>
  </main>

  <!-- Focused incident detail (progressive disclosure) -->
  <div id="scrim" class="scrim hidden"></div>
  <aside id="drawer" class="drawer hidden" aria-hidden="true"></aside>

  <!-- Known-events modals (calendar / form / import) mount here -->
  <div id="ke-scrim" class="scrim hidden"></div>
  <div id="ke-modal" class="modal hidden" role="dialog" aria-hidden="true"></div>

  <div id="toast" class="toast hidden"></div>
  <div id="seg-tip" class="seg-tip hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=18"></script>
  <script src="known_events.js?v=6"></script>
</body>
</html>
